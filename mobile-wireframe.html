<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Notion Mobile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #e3e2e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* MOCKUP FRAME */
    .mockup-frame {
      width: 375px;
      height: 667px;
      background: #ffffff;
      border-radius: 36px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.02),
        0 12px 40px rgba(0,0,0,0.1),
        0 4px 12px rgba(0,0,0,0.06);
    }

    /* STATUS BAR */
    .status-bar {
      height: 44px;
      padding: 12px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      font-weight: 600;
      color: #000;
    }

    /* HOME CONTENT */
    .home-content {
      height: calc(100% - 44px);
      overflow-y: auto;
      padding: 0 18px 40px;
    }

    .home-content::-webkit-scrollbar {
      display: none;
    }

    /* TOP HEADER */
    .top-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 2px 12px;
    }

    .page-title {
      font-size: 20px;
      font-weight: 600;
      color: #37352f;
    }

    .header-icons {
      display: flex;
      gap: 12px;
    }

    .header-icon {
      font-size: 18px;
      opacity: 0.6;
      cursor: pointer;
    }

    /* SEARCH BAR */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f7f6f3;
      border-radius: 8px;
      padding: 11px 14px;
      margin-bottom: 18px;
    }

    .search-icon {
      font-size: 14px;
      opacity: 0.4;
    }

    .search-text {
      font-size: 14px;
      color: #9b9a97;
    }

    /* CATEGORY CARDS - HORIZONTAL */
    .category-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .category-card {
      flex: 1;
      background: #f7f6f3;
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .category-card:active {
      background: #eeede9;
    }

    .category-icon {
      font-size: 16px;
    }

    .category-name {
      font-size: 13px;
      font-weight: 500;
      color: #37352f;
    }

    /* MAIN WRITING SECTION */
    .writing-section {
      display: flex;
      gap: 14px;
      margin-bottom: 28px;
    }

    .writing-preview {
      flex-shrink: 0;
      width: 90px;
      background: #f7f6f3;
      border-radius: 8px;
      padding: 14px 12px;
    }

    .preview-line {
      height: 7px;
      background: #e3e2e0;
      border-radius: 3px;
      margin-bottom: 6px;
    }

    .preview-line:last-child {
      margin-bottom: 0;
      width: 70%;
    }

    .preview-line.check {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .preview-line.check::before {
      content: '☐';
      font-size: 10px;
      color: #9b9a97;
    }

    .writing-action {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .writing-prompt {
      font-size: 15px;
      font-weight: 500;
      color: #37352f;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .writing-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #2383e2;
      font-weight: 500;
      cursor: pointer;
      padding: 6px 0;
    }

    .writing-cta:active {
      opacity: 0.7;
    }

    .cta-arrow {
      font-size: 12px;
    }

    /* TEMPLATE SECTION */
    .template-section {
      padding-top: 20px;
      border-top: 1px solid #e8e7e3;
    }

    .template-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .template-title {
      font-size: 13px;
      font-weight: 600;
      color: #37352f;
    }

    .template-icon {
      font-size: 14px;
      opacity: 0.5;
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .template-card {
      background: #f7f6f3;
      border-radius: 8px;
      padding: 16px 14px;
      cursor: pointer;
    }

    .template-card:active {
      background: #eeede9;
    }

    .template-card-icon {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .template-card-name {
      font-size: 13px;
      font-weight: 500;
      color: #37352f;
    }

    /* RECENT SECTION */
    .recent-section {
      margin-top: 24px;
    }

    .recent-header {
      font-size: 13px;
      font-weight: 600;
      color: #37352f;
      margin-bottom: 12px;
    }

    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .recent-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    .recent-item:active {
      background: #f7f6f3;
    }

    .recent-icon {
      width: 36px;
      height: 36px;
      background: #f7f6f3;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
    }

    .recent-info {
      flex: 1;
    }

    .recent-title {
      font-size: 14px;
      font-weight: 500;
      color: #37352f;
      margin-bottom: 2px;
    }

    .recent-meta {
      font-size: 11px;
      color: #9b9a97;
    }
  </style>
</head>
<body>
  <div class="mockup-frame">
    <!-- STATUS BAR -->
    <div class="status-bar">
      <span>9:41</span>
      <div style="display:flex;gap:2px;font-size:14px;">📶 🔋</div>
    </div>

    <!-- HOME CONTENT -->
    <div class="home-content">
      <!-- TOP HEADER -->
      <div class="top-header">
        <span class="page-title">Name</span>
        <div class="header-icons">
          <span class="header-icon">👤</span>
          <span class="header-icon">☰</span>
        </div>
      </div>

      <!-- SEARCH BAR -->
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <span class="search-text">Search</span>
      </div>

      <!-- CATEGORY CARDS -->
      <div class="category-row">
        <div class="category-card">
          <span class="category-icon">💭</span>
          <span class="category-name">Feels</span>
        </div>
        <div class="category-card">
          <span class="category-icon">🌱</span>
          <span class="category-name">Life</span>
        </div>
      </div>

      <!-- MAIN WRITING SECTION -->
      <div class="writing-section">
        <div class="writing-preview">
          <div class="preview-line"></div>
          <div class="preview-line"></div>
          <div class="preview-line check"></div>
          <div class="preview-line check"></div>
        </div>
        <div class="writing-action">
          <p class="writing-prompt">Something going on your mind?</p>
          <div class="writing-cta">
            Start writing →
          </div>
        </div>
      </div>

      <!-- RECENT SECTION -->
      <div class="recent-section">
        <h3 class="recent-header">Continue</h3>
        <div class="recent-list">
          <div class="recent-item">
            <div class="recent-icon">📋</div>
            <div class="recent-info">
              <p class="recent-title">Project Ideas</p>
              <p class="recent-meta">Edited 2h ago</p>
            </div>
          </div>
          <div class="recent-item">
            <div class="recent-icon">📓</div>
            <div class="recent-info">
              <p class="recent-title">Weekly Review</p>
              <p class="recent-meta">Edited yesterday</p>
            </div>
          </div>
        </div>
      </div>

      <!-- TEMPLATE SECTION -->
      <div class="template-section">
        <div class="template-header">
          <span class="template-icon">✨</span>
          <span class="template-title">Explore templates</span>
        </div>
        <div class="template-grid">
          <div class="template-card">
            <div class="template-card-icon">📋</div>
            <p class="template-card-name">Meeting Notes</p>
          </div>
          <div class="template-card">
            <div class="template-card-icon">📓</div>
            <p class="template-card-name">Daily Journal</p>
          </div>
          <div class="template-card">
            <div class="template-card-icon">✅</div>
            <p class="template-card-name">Task List</p>
          </div>
          <div class="template-card">
            <div class="template-card-icon">💡</div>
            <p class="template-card-name">Brain Dump</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
