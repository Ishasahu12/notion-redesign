<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Notion Mobile — Refined</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #f7f6f3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* DESKTOP CANVAS WITH PHONE MOCKUP */
    .mockup-container {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone-mockup {
      width: 375px;
      height: 812px;
      background-color: #ffffff;
      border-radius: 47px;
      box-shadow:
        0 0 0 12px #1a1a1a,
        0 0 0 14px #2a2a2a,
        0 20px 60px rgba(0, 0, 0, 0.15),
        0 8px 20px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      position: relative;
    }

    /* NOTCH */
    .phone-mockup::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 30px;
      background-color: #1a1a1a;
      border-radius: 0 0 20px 20px;
      z-index: 20;
    }

    /* STATUS BAR */
    .status-bar {
      height: 44px;
      padding: 12px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      font-weight: 600;
      position: relative;
      z-index: 10;
    }

    .status-time {
      color: #1a1a1a;
    }

    .status-icons {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .status-icons span {
      font-size: 14px;
    }

    /* APP CONTENT */
    .app-content {
      height: calc(100% - 44px);
      background-color: #ffffff;
      overflow-y: auto;
      position: relative;
    }

    .app-content::-webkit-scrollbar {
      display: none;
    }

    /* HOME AREA */
    .home-area {
      padding: 20px 20px 100px;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      margin-top: 8px;
    }

    .workspace-name {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .header-actions {
      display: flex;
      gap: 16px;
    }

    .header-icon {
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
    }

    /* SEARCH BAR */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background-color: #f7f6f3;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 24px;
    }

    .search-bar span {
      font-size: 16px;
      color: #9b9a97;
    }

    .search-text {
      font-size: 15px;
      color: #9b9a97;
    }

    /* PRIMARY CTA */
    .primary-cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background-color: #2383e2;
      color: white;
      padding: 16px 20px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      margin-bottom: 28px;
      transition: background-color 0.15s ease;
    }

    .primary-cta:active {
      background-color: #1e6fc9;
    }

    .primary-cta span {
      font-size: 18px;
    }

    /* SECTIONS */
    .section {
      margin-bottom: 28px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #9b9a97;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .section-link {
      font-size: 13px;
      color: #2383e2;
      font-weight: 500;
      text-decoration: none;
    }

    /* RECENT PAGES */
    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .recent-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.1s ease;
    }

    .recent-item:active {
      background-color: #f7f6f3;
    }

    .recent-icon {
      width: 40px;
      height: 40px;
      background-color: #f7f6f3;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .recent-info {
      flex: 1;
    }

    .recent-title {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 2px;
    }

    .recent-meta {
      font-size: 12px;
      color: #9b9a97;
    }

    .recent-chevron {
      font-size: 14px;
      color: #d4d3cf;
    }

    /* TEMPLATE CARDS */
    .template-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .template-card {
      background-color: #f7f6f3;
      border-radius: 10px;
      padding: 18px 16px;
      cursor: pointer;
      transition: background-color 0.1s ease;
    }

    .template-card:active {
      background-color: #eeede9;
    }

    .template-icon {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .template-name {
      font-size: 14px;
      font-weight: 500;
      color: #1a1a1a;
    }

    /* EMPTY STATE */
    .empty-state {
      background-color: #f7f6f3;
      border-radius: 12px;
      padding: 24px 20px;
      text-align: center;
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .empty-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .empty-text {
      font-size: 13px;
      color: #9b9a97;
      margin-bottom: 16px;
    }

    .empty-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: #2383e2;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }

    .empty-cta:active {
      background-color: #1e6fc9;
    }

    /* STARTER BLOCKS */
    .starter-blocks {
      margin-top: 20px;
      text-align: left;
    }

    .starter-line {
      height: 10px;
      background-color: #e8e7e3;
      border-radius: 5px;
      margin-bottom: 8px;
    }

    .starter-line:last-child {
      margin-bottom: 0;
      width: 75%;
    }

    .starter-line.checklist {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .starter-line.checklist::before {
      content: '☐';
      font-size: 14px;
      color: #9b9a97;
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: #ffffff;
      border-top: 1px solid #e8e7e3;
      display: flex;
      justify-content: space-around;
      padding: 8px 0 24px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 8px 16px;
      color: #9b9a97;
      cursor: pointer;
    }

    .nav-item.active {
      color: #2383e2;
    }

    .nav-icon {
      font-size: 20px;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 500;
    }

    .nav-item.create {
      margin-top: -16px;
    }

    .create-btn {
      width: 48px;
      height: 48px;
      background-color: #2383e2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      box-shadow: 0 4px 12px rgba(35, 131, 226, 0.35);
    }
  </style>
</head>
<body>
  <div class="mockup-container">
    <div class="phone-mockup">
      <!-- STATUS BAR -->

      <!-- APP CONTENT -->

          <div class="section">

            <div class="template-grid">

              <div class="template-card">

              </div>
              <div class="template-card">

              <div class="template-card">

          <!-- EMPTY STATE (uncomment to see) -->

          <div class="section">
            <div class="empty-state">
              <div class="empty-icon">📝</div>
              <h3 class="empty-title">Your workspace is ready</h3>
              <p class="empty-text">Start with a blank page or choose a template</p>
              <button class="empty-cta">Create your first page</button>
              <div class="starter-blocks">
                <div class="starter-line"></div>
                <div class="starter-line checklist"></div>
                <div class="starter-line checklist"></div>
              </div>
            </div>
          </div>
          -->
        </div>

        <!-- BOTTOM NAV -->
        <nav class="bottom-nav">
          <div class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Home</span>
          </div>
          <div class="nav-item">
            <span class="nav-icon">🔍</span>
            <span class="nav-label">Search</span>
          </div>
          <div class="nav-item create">
            <div class="create-btn">+</div>
          </div>
          <div class="nav-item">
            <span class="nav-icon">📁</span>

          </div>
          <div class="nav-item">
            <span class="nav-icon">👤</span>

          </div>
        </nav>
      </div>
    </div>
  </div>
</body>
</html>
